<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Castle Defender</title>
    <link rel="stylesheet" href="../action-style.css" />
  </head>
  <body>
    <main class="game">
      <div class="hud"><strong id="title"></strong><span>HP <b id="health">0</b></span><span>Score <b id="score">0</b></span></div>
      <canvas id="game"></canvas>
      <button class="action" id="action" type="button">Fire</button>
      <button id="restart" type="button"></button>
    </main>
    <script>
      window.ACTION_GAME_CONFIG = { title: "Castle Defender", type: "defender", health: 6, enemyShape: "zombie", enemyColor: "#f05d5e", fireRate: 10, spawnRate: 38, hitScore: 7, bgA: "#151614", bgB: "#26301f" };
    </script>
    <script src="../action-pack.js"></script>
  </body>
</html>
