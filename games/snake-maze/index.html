<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Maze — Webgame Arcades</title>
  <meta name="description" content="Navigate a snake through a real maze. Eat food to grow, but avoid inner walls, your own tail, and tight corridors. Free browser game." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://webgamearcades.com/games/snake-maze/" />
  <meta property="og:title" content="Snake Maze — Webgame Arcades" />
  <meta property="og:description" content="Navigate a snake through a real maze. Eat food to grow, avoid inner walls and your own tail." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://webgamearcades.com/games/snake-maze/" />
  <meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1237395397379866" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../action-style.css" />
  <style>
    .game { height: 100dvh; width: min(720px, 100%); grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
    canvas { grid-column: 1/-1; width: 100%; height: 100%; min-height: 0; border: 1px solid rgba(255,255,255,0.13); border-radius: 8px; background: #151820; touch-action: none; }
    .touch-row { display: flex; justify-content: center; gap: 6px; margin-top: 4px; }
    .touch-row button { width: 48px; height: 48px; font-size: 20px; padding: 0; border-radius: 10px; opacity: 0.7; }
    .touch-row button:active { opacity: 1; }
  </style>
  <script src="/site-chrome.js"></script>
</head>
<body>
<main class="game">
  <div class="hud">
    <strong>Snake Maze</strong>
    <span>Score <b id="score">0</b></span>
    <span>Best <b id="best">0</b></span>
  </div>
  <canvas id="c"></canvas>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button class="reset" id="reset" type="button">Restart</button>
    <a href="about.html" style="display:inline-flex;align-items:center;min-height:40px;padding:9px 13px;border:1px solid rgba(255,255,255,0.14);border-radius:8px;background:rgba(255,255,255,0.08);color:#b8bec9;text-decoration:none;font-size:inherit;">Info</a>
    <div class="touch-row">
      <button id="bU">▲</button><button id="bL">◀</button><button id="bD">▼</button><button id="bR">▶</button>
    </div>
  </div>
</main>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const bestEl  = document.getElementById("best");

const GRID = 20;

// Cross-shaped maze walls:
//   Horizontal barriers at y=5 and y=14 (gap at x=10)
//   Vertical barriers at x=5 and x=14 (gap at y=10)
// This creates a central cross corridor and four enclosed quadrant sections.
const WALL_SET = new Set();
for (let x = 0; x < GRID; x++) {
  if (x !== 10) { WALL_SET.add(`${x},5`); WALL_SET.add(`${x},14`); }
}
for (let y = 6; y < 14; y++) {
  if (y !== 10) { WALL_SET.add(`5,${y}`); WALL_SET.add(`14,${y}`); }
}

let W, H, CS, snake, dir, nextDir, food, score, best = 0, running = false, gameStarted = false, intervalId;

function resize() {
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  W = canvas.width; H = canvas.height;
  CS = Math.floor(Math.min(W, H) / GRID);
}
new ResizeObserver(() => { resize(); if (!running) draw(); }).observe(canvas);
resize();

function randCell() {
  const taken = new Set(snake.map(s => `${s.x},${s.y}`));
  let x, y;
  do {
    x = Math.floor(Math.random() * GRID);
    y = Math.floor(Math.random() * GRID);
  } while (taken.has(`${x},${y}`) || WALL_SET.has(`${x},${y}`));
  return { x, y };
}

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  food = randCell(); score = 0;
  scoreEl.textContent = 0; running = true; gameStarted = true;
  clearInterval(intervalId);
  intervalId = setInterval(step, 120);
}

function step() {
  dir = { ...nextDir };
  const head = { x: (snake[0].x + dir.x + GRID) % GRID, y: (snake[0].y + dir.y + GRID) % GRID };
  if (WALL_SET.has(`${head.x},${head.y}`)) { endGame(); return; }
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    food = randCell();
    clearInterval(intervalId);
    intervalId = setInterval(step, Math.max(60, 120 - score * 0.5));
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const ox = (W - CS * GRID) / 2, oy = (H - CS * GRID) / 2;

  // grid lines
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(ox + i * CS, oy); ctx.lineTo(ox + i * CS, oy + CS * GRID); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox, oy + i * CS); ctx.lineTo(ox + CS * GRID, oy + i * CS); ctx.stroke();
  }

  // maze walls
  WALL_SET.forEach(key => {
    const [wx, wy] = key.split(",").map(Number);
    ctx.fillStyle = "#1e2535";
    ctx.fillRect(ox + wx * CS, oy + wy * CS, CS, CS);
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    ctx.fillRect(ox + wx * CS + 1, oy + wy * CS + 1, CS - 2, CS - 2);
  });

  // food
  ctx.save();
  ctx.shadowColor = "#f05d5e"; ctx.shadowBlur = 14 * devicePixelRatio;
  ctx.fillStyle = "#f05d5e";
  ctx.beginPath();
  ctx.arc(ox + food.x * CS + CS / 2, oy + food.y * CS + CS / 2, CS * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // snake
  snake.forEach((s, i) => {
    const t = i / snake.length;
    ctx.fillStyle = i === 0 ? "#2bd1c4" : `hsl(${160 - t * 60},80%,${50 - t * 10}%)`;
    const pad = CS * 0.08;
    ctx.beginPath();
    ctx.roundRect(ox + s.x * CS + pad, oy + s.y * CS + pad, CS - pad * 2, CS - pad * 2, [CS * 0.2]);
    ctx.fill();
  });

  if (!gameStarted) {
    ctx.fillStyle = "rgba(11,12,15,0.78)"; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#f4f2ea"; ctx.textAlign = "center";
    ctx.font = `bold ${CS * 1.2}px system-ui`; ctx.fillText("Snake Maze", W / 2, H * 0.4);
    ctx.font = `${CS * 0.7}px system-ui`; ctx.fillStyle = "#b8bec9";
    ctx.fillText("Navigate through the maze walls", W / 2, H * 0.52);
    ctx.fillText("Arrow keys or swipe to start", W / 2, H * 0.61);
  }
}

document.addEventListener("keydown", e => {
  const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
  if (map[e.key]) {
    e.preventDefault();
    if (!running) { init(); return; }
    const d = map[e.key];
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  }
});

["bU","bD","bL","bR"].forEach((id, i) => {
  const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
  document.getElementById(id).addEventListener("pointerdown", e => {
    e.preventDefault();
    if (!running) { init(); return; }
    const d = dirs[i];
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  });
});

let tx0, ty0;
canvas.addEventListener("pointerdown", e => { tx0 = e.clientX; ty0 = e.clientY; });
canvas.addEventListener("pointerup", e => {
  const dx = e.clientX - tx0, dy = e.clientY - ty0;
  if (Math.hypot(dx, dy) < 20) { if (!running) init(); return; }
  const d = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
    : (dy > 0 ? {x:0,y:1} : {x:0,y:-1});
  if (!running) { init(); return; }
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
});

function endGame() {
  running = false; clearInterval(intervalId);
  ctx.fillStyle = "rgba(11,12,15,0.82)"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#f4f2ea"; ctx.textAlign = "center";
  ctx.font = `bold ${CS * 1.1}px system-ui`; ctx.fillText("Game Over", W / 2, H * 0.44);
  ctx.font = `${CS * 0.75}px system-ui`; ctx.fillStyle = "#b8bec9";
  ctx.fillText(`Score: ${score}  Best: ${best}`, W / 2, H * 0.56);
  ctx.font = `${CS * 0.6}px system-ui`;
  ctx.fillText("Press any arrow key or tap to restart", W / 2, H * 0.66);
}

document.getElementById("reset").addEventListener("click", init);
draw();
</script>
</body>
</html>
