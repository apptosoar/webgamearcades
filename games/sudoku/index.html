<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta property="og:url" content="https://webgamearcades.com/games/sudoku/">

<style>
.site-topbar{width:100%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;min-height:56px;padding:0 clamp(12px,3vw,32px);border-bottom:1px solid rgba(255,255,255,0.12);background:rgba(16,17,20,0.84);backdrop-filter:blur(18px);box-sizing:border-box;flex-shrink:0;position:sticky;top:0;z-index:10}
.site-brand{display:flex;align-items:center;gap:8px;color:#f4f2ea;text-decoration:none;font-weight:800;min-width:0}
.site-brand-mark{display:grid;width:30px;height:30px;flex-shrink:0;place-items:center;border-radius:7px;background:linear-gradient(135deg,#f7b84b,#f05d5e);color:#15110a;box-shadow:0 4px 12px rgba(247,184,75,0.2)}
.site-brand-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:380px){.site-brand-name{display:none}}
.game-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.game-actions a{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.06);color:#b8bec9;text-decoration:none;font-size:.82rem;font-weight:600;transition:background .15s,color .15s;white-space:nowrap}
.game-actions a:hover{background:rgba(255,255,255,0.12);color:#f4f2ea}
.wrap{height:min(calc(100svh - 56px),720px)!important;flex-shrink:0}
@media(max-width:520px){.game-actions .about-label{display:none}}
</style>
</head>
<body class="game-sudoku">
<header class="site-topbar">
  <a class="site-brand" href="/"><span class="site-brand-mark">G</span><span class="site-brand-name">Webgame Arcades</span></a>
  <div class="game-actions">
    <a href="./about.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span class="about-label">About</span>
    </a>
    <a href="/">← Games</a>
  </div>
</header>
<div class="wrap">
  <div class="hud">
    <span class="pill">Sudoku</span>
    <span>Number puzzle</span>
  </div>
  <div class="stage center">
    <div>
      <p style="margin:0 0 12px;color:#b8bec9">Fill the grid so each row and column follows the rule.</p>
      <div id="sizes" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:10px"></div>
      <div id="board" style="display:grid;gap:4px;justify-content:center"></div>
      <p id="status" style="min-height:24px;color:#2bd1c4;font-weight:800"></p>
    </div>
  </div>
  <button onclick="location.reload()">Restart</button>
</div>
<script>
  const sizes = document.querySelector("#sizes");
  const board = document.querySelector("#board");
  const status = document.querySelector("#status");
  const options = [4, 5, 6, 8, 10];
  let size = 4, answer = [], cells = [], fixed = [], complete = false;
  options.forEach(n => {
    sizes.insertAdjacentHTML("beforeend", '<button type="button" data-size="' + n + '" style="min-width:58px;height:36px;padding:0 8px">' + n + 'x' + n + '</button>');
  });
  sizes.onclick = e => { const b = e.target.closest("[data-size]"); if (b) start(Number(b.dataset.size)); };
  function inputCell(i, el) {
    if (fixed[i] || complete) return;
    cells[i] = (cells[i] % size) + 1;
    if (el) el.textContent = cells[i] || "";
    check(); drawBoard();
  }
  function shuffle(list) {
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = list[i]; list[i] = list[j]; list[j] = t; }
    return list;
  }
  function start(n) {
    size = n; complete = false;
    const nums = shuffle(Array.from({ length: n }, (_, i) => i + 1));
    const rows = shuffle(Array.from({ length: n }, (_, i) => i));
    const cols = shuffle(Array.from({ length: n }, (_, i) => i));
    answer = [];
    for (let r = 0; r < n; r++) for (let c = 0; c < n; c++) answer.push(nums[(rows[r] + cols[c]) % n]);
    cells = answer.map(v => Math.random() < 0.48 ? v : 0);
    fixed = cells.map(Boolean);
    drawSizes(); drawBoard(); updateStatus();
  }
  function drawSizes() {
    [...sizes.children].forEach(b => {
      const active = Number(b.dataset.size) === size;
      b.style.background = active ? "#2bd1c4" : "#f7b84b";
      b.style.color = active ? "#0b0c0f" : "#1b1205";
    });
  }
  function hasConflict(i) {
    const v = cells[i]; if (!v) return false;
    const row = Math.floor(i / size), col = i % size;
    for (let n = 0; n < size; n++) {
      const ri = row * size + n, ci = n * size + col;
      if ((ri !== i && cells[ri] === v) || (ci !== i && cells[ci] === v)) return true;
    }
    return false;
  }
  function drawBoard() {
    const gap = 4, maxTile = size >= 10 ? 32 : size >= 8 ? 36 : size >= 6 ? 44 : 58;
    const avail = Math.min(window.innerWidth - 64, 400);
    const tile = Math.min(maxTile, Math.floor((avail - (size - 1) * gap) / size));
    const review = cells.every(Boolean);
    board.style.gridTemplateColumns = "repeat(" + size + "," + tile + "px)";
    board.innerHTML = "";
    cells.forEach((v, i) => {
      const bad = review && hasConflict(i), locked = fixed[i] || complete;
      const bg = complete ? "#73d676" : bad ? "#f05d5e" : fixed[i] ? "#2bd1c4" : "rgba(255,255,255,.08)";
      const fg = complete || fixed[i] ? "#0b0c0f" : "#f4f2ea";
      const fs = tile < 30 ? ".65rem" : tile < 42 ? ".78rem" : ".95rem";
      const cell = document.createElement("button");
      cell.type = "button";
      cell.textContent = v || "";
      cell.style.cssText = "width:" + tile + "px;height:" + tile + "px;padding:0;border-radius:8px;font-weight:800;font-size:" + fs + ";background:" + bg + ";color:" + fg + ";opacity:1;cursor:" + (locked ? "default" : "pointer");
      if (!locked) cell.onclick = () => inputCell(i, cell);
      board.appendChild(cell);
    });
  }
  const labels = { complete: "Complete!", reviewNeeded: "Review needed", progress: "Progress" };
  function updateStatus() { const filled = cells.filter(Boolean).length; status.textContent = labels.progress + " " + filled + " / " + cells.length; }
  function check() {
    const filled = cells.every(Boolean);
    complete = filled && cells.every((_, i) => !hasConflict(i));
    if (complete) { status.textContent = labels.complete; return; }
    if (filled) { status.textContent = labels.reviewNeeded; return; }
    updateStatus();
  }
  start(4);
  window.addEventListener("resize", () => { if (cells.length) drawBoard(); });
</script>


</body>
</html>
