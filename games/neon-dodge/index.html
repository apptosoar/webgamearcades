<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Dodge — Webgame Arcades</title>
<meta name="description" content="Move freely to dodge a barrage of falling neon blocks. Free reflex arcade game — play instantly in your browser, no download needed.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://webgamearcades.com/games/neon-dodge/">
<meta property="og:title" content="Neon Dodge — Webgame Arcades">
<meta property="og:description" content="Move freely to dodge a barrage of falling neon blocks. Free reflex arcade game — play instantly in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://webgamearcades.com/games/neon-dodge/">
<meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png">
<link rel="stylesheet" href="../game-shell.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1237395397379866" crossorigin="anonymous"></script>
<script src="../game-shell.js"></script>

<style>
.site-topbar{width:100%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;min-height:52px;padding:0 clamp(12px,3vw,32px);border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(14,15,18,0.97);box-sizing:border-box;flex-shrink:0;position:sticky;top:0;z-index:10}
.site-brand{display:flex;align-items:center;gap:8px;color:#f4f2ea;text-decoration:none;font-weight:800;font-size:.9rem;min-width:0}
.site-brand-mark{display:grid;width:28px;height:28px;flex-shrink:0;place-items:center;border-radius:6px;background:linear-gradient(135deg,#f7b84b,#f05d5e);color:#15110a;font-weight:900;font-size:.78rem}
.site-brand-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:380px){.site-brand-name{display:none}}
.game-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.game-actions a{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:7px;border:1px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.06);color:#b8bec9;text-decoration:none;font-size:.8rem;font-weight:600;transition:background .15s,color .15s;white-space:nowrap}
.game-actions a:hover{background:rgba(255,255,255,0.12);color:#f4f2ea}
.wrap{height:min(calc(100svh - 52px),720px)!important;flex-shrink:0}
@media(max-width:520px){.game-actions .about-label{display:none}}
</style>
</head>
<body class="game-neon-dodge">
<header class="site-topbar">
  <a class="site-brand" href="/"><span class="site-brand-mark">G</span><span class="site-brand-name">Webgame Arcades</span></a>
  <div class="game-actions">
    <a href="./about.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span class="about-label">About</span>
    </a>
    <a href="/">← Games</a>
  </div>
</header>
<div class="wrap">
  <div class="hud">
    <span class="pill">Neon Dodge</span>
    <span>Score <b id="score">0</b></span>
  </div>
  <div class="stage" id="stage">
    <div id="player"></div>
  </div>
  <button id="restart">Restart</button>
</div>
<script>
  const stage = document.querySelector("#stage");
  const player = document.querySelector("#player");
  const scoreEl = document.querySelector("#score");
  const gameOver = "Game Over", scoreLabel = "Score";
  let x = 50, y = 50, score = 0, alive = true, blocks = [];
  player.style.cssText = "position:absolute;width:34px;height:34px;border-radius:8px;background:#2bd1c4;left:50%;top:50%;box-shadow:0 0 24px #2bd1c4";
  function clampPlayer() { x = Math.max(3, Math.min(92, x)); y = Math.max(5, Math.min(90, y)); }
  function move(key) {
    if (key === "ArrowLeft") x -= 5;
    if (key === "ArrowRight") x += 5;
    if (key === "ArrowUp") y -= 5;
    if (key === "ArrowDown") y += 5;
    clampPlayer();
  }
  addEventListener("keydown", e => move(e.key));
  stage.addEventListener("pointerdown", trackTouch);
  stage.addEventListener("pointermove", trackTouch);
  function trackTouch(e) {
    const r = stage.getBoundingClientRect();
    x = ((e.clientX - r.left) / r.width) * 100;
    y = ((e.clientY - r.top) / r.height) * 100;
    clampPlayer();
  }
  installTouchControls({ move });
  document.querySelector("#restart").onclick = () => location.reload();
  function spawn() {
    const b = document.createElement("i");
    b.style.cssText = "position:absolute;width:28px;height:28px;border-radius:6px;background:#f05d5e;left:" + Math.random() * 92 + "%;top:-30px;box-shadow:0 0 18px #f05d5e";
    stage.appendChild(b);
    blocks.push({ el: b, top: -8, speed: 1.4 + Math.random() * 2 });
  }
  setInterval(() => alive && spawn(), 650);
  function loop() {
    if (!alive) return;
    score++;
    scoreEl.textContent = score;
    player.style.left = x + "%";
    player.style.top = y + "%";
    const pr = player.getBoundingClientRect();
    blocks.forEach(b => {
      b.top += b.speed;
      b.el.style.top = b.top + "%";
      const r = b.el.getBoundingClientRect();
      if (!(pr.right < r.left || pr.left > r.right || pr.bottom < r.top || pr.top > r.bottom)) {
        alive = false;
        stage.classList.add("center");
        stage.innerHTML = "<h2>" + gameOver + "<br>" + scoreLabel + " " + score + "</h2>";
      }
    });
    requestAnimationFrame(loop);
  }
  loop();
</script>


</body>
</html>
