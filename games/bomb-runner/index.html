<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bomb Runner</title>
    <link rel="stylesheet" href="../action-style.css" />
  </head>
  <body>
    <main class="game">
      <div class="hud"><strong id="title"></strong><span>HP <b id="health">0</b></span><span>Score <b id="score">0</b></span></div>
      <canvas id="game"></canvas>
      <button class="action" id="action" type="button">Jump</button>
      <button id="restart" type="button"></button>
    </main>
    <script>
      window.ACTION_GAME_CONFIG = { title: "Bomb Runner", type: "runner", health: 3, playerShape: "ninja", playerColor: "#2bd1c4", enemyShape: "bomb", hazardColor: "#f05d5e", spawnRate: 34, passiveScore: 2, bgA: "#171512", bgB: "#2f2415" };
    </script>
    <script src="../action-pack.js"></script>
  </body>
</html>
