<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Clicker — Webgame Arcades</title>
    <meta name="description" content="A satisfying clicker game you can play right in your browser. Play free instantly — no download or install needed." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://webgamearcades.com/games/sample-clicker/" />
    <meta property="og:title" content="Sample Clicker — Webgame Arcades" />
    <meta property="og:description" content="A satisfying clicker game you can play right in your browser. Play free instantly — no download or install needed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webgamearcades.com/games/sample-clicker/" />
    <meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0c0f;
        color: #f4f2ea;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .game {
        width: min(720px, calc(100% - 28px));
        min-height: 460px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 14px;
        padding: 18px;
      }

      .hud {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #b8bec9;
      }

      .stage {
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 8px;
        background:
          radial-gradient(circle at 22% 24%, rgba(43, 209, 196, 0.28), transparent 28%),
          radial-gradient(circle at 78% 68%, rgba(247, 184, 75, 0.22), transparent 28%),
          repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.06) 0 2px, transparent 2px 34px),
          linear-gradient(135deg, rgba(43, 209, 196, 0.16), rgba(169, 139, 255, 0.18)),
          #151820;
        text-align: center;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        pointer-events: none;
      }

      .target {
        position: relative;
        z-index: 2;
        width: 160px;
        height: 160px;
        border: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, #f7b84b, #f05d5e);
        color: #1b1205;
        font-size: 1.35rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 18px 40px rgba(240, 93, 94, 0.3);
      }

      .target:active {
        transform: scale(0.96);
      }

      .particle {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 1;
        display: grid;
        width: 18px;
        height: 18px;
        place-items: center;
        color: var(--particle-color);
        font-size: var(--particle-size);
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.42), 0 0 12px var(--particle-glow);
        transform: translate(-50%, -50%);
        animation: burst 720ms cubic-bezier(0.16, 0.84, 0.24, 1) forwards;
      }

      .particle.square {
        background: var(--particle-color);
        box-shadow: 0 0 0 2px rgba(11, 12, 15, 0.42), 0 0 14px var(--particle-glow);
        border-radius: 4px;
        color: transparent;
      }

      .particle.triangle {
        width: 0;
        height: 0;
        border-right: 9px solid transparent;
        border-bottom: 16px solid var(--particle-color);
        border-left: 9px solid transparent;
        filter: drop-shadow(0 0 10px var(--particle-glow)) drop-shadow(0 2px 0 rgba(0, 0, 0, 0.45));
        color: transparent;
      }

      @keyframes burst {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(0.6) rotate(0deg);
        }

        100% {
          opacity: 0;
          transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--spin));
        }
      }

      .reset {
        justify-self: start;
        min-height: 40px;
        padding: 9px 13px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #f4f2ea;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="game">
      <div class="hud">
        <strong>Sample Clicker</strong>
        <span><span id="scoreLabel">점수</span> <b id="score">0</b></span>
      </div>
      <section class="stage">
        <button class="target" id="target" type="button">클릭</button>
      </section>
      <button class="reset" id="reset" type="button">다시 시작</button>
    </main>

    <script>
      const translations = {
        ko: { score: "점수", click: "클릭", bonus: "보너스", restart: "다시 시작" },
        en: { score: "Score", click: "Click", bonus: "Bonus", restart: "Restart" },
        es: { score: "Puntuación", click: "Clic", bonus: "Bono", restart: "Reiniciar" },
        zh: { score: "分数", click: "点击", bonus: "奖励", restart: "重新开始" },
        ja: { score: "スコア", click: "クリック", bonus: "ボーナス", restart: "やり直す" },
        de: { score: "Punkte", click: "Klick", bonus: "Bonus", restart: "Neu starten" },
        fr: { score: "Score", click: "Cliquer", bonus: "Bonus", restart: "Recommencer" },
        hi: { score: "स्कोर", click: "क्लिक", bonus: "बोनस", restart: "फिर शुरू करें" },
        cs: { score: "Skóre", click: "Klik", bonus: "Bonus", restart: "Restartovat" },
        nl: { score: "Score", click: "Klik", bonus: "Bonus", restart: "Opnieuw starten" },
        fi: { score: "Pisteet", click: "Klikkaa", bonus: "Bonus", restart: "Aloita uudelleen" },
        he: { score: "ניקוד", click: "לחיצה", bonus: "בונוס", restart: "התחל מחדש" },
        ro: { score: "Scor", click: "Click", bonus: "Bonus", restart: "Repornește" },
        uk: { score: "Рахунок", click: "Клік", bonus: "Бонус", restart: "Почати знову" },
        mk: { score: "Резултат", click: "Клик", bonus: "Бонус", restart: "Почни повторно" },
      };

      function detectLocale() {
        const languages = navigator.languages?.length ? navigator.languages : [navigator.language || "en"];
        for (const language of languages) {
          const code = language.toLowerCase();
          if (code.startsWith("ko")) return "ko";
          if (code.startsWith("es")) return "es";
          if (code.startsWith("zh")) return "zh";
          if (code.startsWith("ja")) return "ja";
          if (code.startsWith("de")) return "de";
          if (code.startsWith("fr")) return "fr";
          if (code.startsWith("hi")) return "hi";
          if (code.startsWith("cs")) return "cs";
          if (code.startsWith("nl")) return "nl";
          if (code.startsWith("fi")) return "fi";
          if (code.startsWith("he") || code.startsWith("iw")) return "he";
          if (code.startsWith("ro")) return "ro";
          if (code.startsWith("uk")) return "uk";
          if (code.startsWith("mk")) return "mk";
          if (code.startsWith("en")) return "en";
        }
        return "en";
      }

      const currentLocale = detectLocale();
      const copy = translations[currentLocale];
      const score = document.querySelector("#score");
      const scoreLabel = document.querySelector("#scoreLabel");
      const target = document.querySelector("#target");
      const stage = document.querySelector(".stage");
      const reset = document.querySelector("#reset");
      let count = 0;

      document.documentElement.lang = currentLocale;
      document.documentElement.dir = currentLocale === "he" ? "rtl" : "ltr";
      scoreLabel.textContent = copy.score;
      target.textContent = copy.click;
      reset.textContent = copy.restart;

      target.addEventListener("click", (event) => {
        count += 1;
        score.textContent = count;
        target.textContent = count % 10 === 0 ? copy.bonus : copy.click;
        burst(event);
      });

      reset.addEventListener("click", () => {
        count = 0;
        score.textContent = count;
        target.textContent = copy.click;
      });

      function burst(event) {
        const stageBox = stage.getBoundingClientRect();
        const targetBox = target.getBoundingClientRect();
        const originX = event.clientX ? event.clientX - stageBox.left : targetBox.left + targetBox.width / 2 - stageBox.left;
        const originY = event.clientY ? event.clientY - stageBox.top : targetBox.top + targetBox.height / 2 - stageBox.top;
        const colors = ["#00f5e0", "#ffb000", "#ff334d", "#8f5cff", "#38e05f", "#ffffff"];
        const shapes = ["square", "triangle", "star", "diamond", "circle"];

        for (let i = 0; i < 18; i += 1) {
          const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.45;
          const distance = 54 + Math.random() * 92;
          const particle = document.createElement("span");
          const shape = shapes[Math.floor(Math.random() * shapes.length)];
          particle.className = `particle ${shape}`;
          particle.textContent = shape === "star" ? "★" : shape === "diamond" ? "◆" : shape === "circle" ? "●" : "";
          particle.style.left = `${originX}px`;
          particle.style.top = `${originY}px`;
          particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
          particle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
          particle.style.setProperty("--spin", `${Math.random() * 360 - 180}deg`);
          const color = colors[Math.floor(Math.random() * colors.length)];
          particle.style.setProperty("--particle-color", color);
          particle.style.setProperty("--particle-glow", color);
          particle.style.setProperty("--particle-size", `${14 + Math.random() * 12}px`);
          stage.appendChild(particle);
          particle.addEventListener("animationend", () => particle.remove(), { once: true });
        }
      }
    </script>
  </body>
</html>
