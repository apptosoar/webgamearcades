<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Clicker — Webgame Arcades</title>
    <meta name="description" content="A satisfying clicker game you can play right in your browser. Play free instantly — no download or install needed." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://webgamearcades.com/games/sample-clicker/" />
    <meta property="og:title" content="Sample Clicker — Webgame Arcades" />
    <meta property="og:description" content="A satisfying clicker game you can play right in your browser. Play free instantly — no download or install needed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webgamearcades.com/games/sample-clicker/" />
    <meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1237395397379866" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../action-style.css" />
    <style>
      .game {
        height: 100dvh;
        width: min(720px, 100%);
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }

      .stage {
        position: relative;
        overflow: hidden;
        display: grid;
        place-items: center;
        height: 100%;
        min-height: 0;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 8px;
        background:
          radial-gradient(circle at 22% 24%, rgba(43, 209, 196, 0.28), transparent 28%),
          radial-gradient(circle at 78% 68%, rgba(247, 184, 75, 0.22), transparent 28%),
          repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.06) 0 2px, transparent 2px 34px),
          linear-gradient(135deg, rgba(43, 209, 196, 0.16), rgba(169, 139, 255, 0.18)),
          #151820;
        text-align: center;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        pointer-events: none;
      }

      .target {
        position: relative;
        z-index: 2;
        width: 160px;
        height: 160px;
        border: 0;
        border-radius: 50%;
        background: linear-gradient(135deg, #f7b84b, #f05d5e);
        color: #1b1205;
        font-size: 1.35rem;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 18px 40px rgba(240, 93, 94, 0.3);
      }

      .target:active { transform: scale(0.96); }

      .stage .target {
        grid-row: auto;
        justify-self: center;
        align-self: center;
      }

      .particle {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 1;
        display: grid;
        width: 18px;
        height: 18px;
        place-items: center;
        color: var(--particle-color);
        font-size: var(--particle-size);
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.42), 0 0 12px var(--particle-glow);
        transform: translate(-50%, -50%);
        animation: burst 720ms cubic-bezier(0.16, 0.84, 0.24, 1) forwards;
      }

      .particle.square {
        background: var(--particle-color);
        box-shadow: 0 0 0 2px rgba(11, 12, 15, 0.42), 0 0 14px var(--particle-glow);
        border-radius: 4px;
        color: transparent;
      }

      .particle.triangle {
        width: 0;
        height: 0;
        border-right: 9px solid transparent;
        border-bottom: 16px solid var(--particle-color);
        border-left: 9px solid transparent;
        filter: drop-shadow(0 0 10px var(--particle-glow)) drop-shadow(0 2px 0 rgba(0, 0, 0, 0.45));
        color: transparent;
      }

      @keyframes burst {
        0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.6) rotate(0deg); }
        100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--spin)); }
      }
    </style>
    <script src="/site-chrome.js"></script>
  </head>
  <body>
    <main class="game">
      <div class="hud">
        <strong id="gameTitle">Sample Clicker</strong>
        <span><span id="scoreLabel">Score</span> <b id="score">0</b></span>
      </div>
      <section class="stage">
        <button class="target" id="target" type="button">Click</button>
      </section>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="reset" id="reset" type="button">Restart</button>
        <a href="about.html" style="display:inline-flex;align-items:center;min-height:40px;padding:9px 13px;border:1px solid rgba(255,255,255,0.14);border-radius:8px;background:rgba(255,255,255,0.08);color:#b8bec9;text-decoration:none;font-size:inherit;">Info</a>
      </div>
    </main>

    <script>
      const translations = {
        ko: { score: "점수", click: "클릭", bonus: "보너스", restart: "다시 시작" },
        en: { score: "Score", click: "Click", bonus: "Bonus", restart: "Restart" },
        es: { score: "Puntuación", click: "Clic", bonus: "Bono", restart: "Reiniciar" },
        zh: { score: "分数", click: "点击", bonus: "奖励", restart: "重新开始" },
        ja: { score: "スコア", click: "クリック", bonus: "ボーナス", restart: "やり直す" },
        de: { score: "Punkte", click: "Klick", bonus: "Bonus", restart: "Neu starten" },
        fr: { score: "Score", click: "Cliquer", bonus: "Bonus", restart: "Recommencer" },
        hi: { score: "स्कोर", click: "क्लिक", bonus: "बोनस", restart: "फिर शुरू करें" },
        cs: { score: "Skóre", click: "Klik", bonus: "Bonus", restart: "Restartovat" },
        nl: { score: "Score", click: "Klik", bonus: "Bonus", restart: "Opnieuw starten" },
        fi: { score: "Pisteet", click: "Klikkaa", bonus: "Bonus", restart: "Aloita uudelleen" },
        he: { score: "ניקוד", click: "לחיצה", bonus: "בונוס", restart: "התחל מחדש" },
        ro: { score: "Scor", click: "Click", bonus: "Bonus", restart: "Repornește" },
        uk: { score: "Рахунок", click: "Клік", bonus: "Бонус", restart: "Почати знову" },
        mk: { score: "Резултат", click: "Клик", bonus: "Бонус", restart: "Почни повторно" },
      };

      function detectLocale() {
        const languages = navigator.languages?.length ? navigator.languages : [navigator.language || "en"];
        for (const lang of languages) {
          const c = lang.toLowerCase();
          if (c.startsWith("ko")) return "ko";
          if (c.startsWith("es")) return "es";
          if (c.startsWith("zh")) return "zh";
          if (c.startsWith("ja")) return "ja";
          if (c.startsWith("de")) return "de";
          if (c.startsWith("fr")) return "fr";
          if (c.startsWith("hi")) return "hi";
          if (c.startsWith("cs")) return "cs";
          if (c.startsWith("nl")) return "nl";
          if (c.startsWith("fi")) return "fi";
          if (c.startsWith("he") || c.startsWith("iw")) return "he";
          if (c.startsWith("ro")) return "ro";
          if (c.startsWith("uk")) return "uk";
          if (c.startsWith("mk")) return "mk";
          if (c.startsWith("en")) return "en";
        }
        return "en";
      }

      const currentLocale = detectLocale();
      const copy = translations[currentLocale] || translations.en;
      const scoreEl = document.querySelector("#score");
      const scoreLabel = document.querySelector("#scoreLabel");
      const target = document.querySelector("#target");
      const stage = document.querySelector(".stage");
      const reset = document.querySelector("#reset");
      let count = 0;

      document.documentElement.lang = currentLocale;
      document.documentElement.dir = currentLocale === "he" ? "rtl" : "ltr";
      scoreLabel.textContent = copy.score;
      target.textContent = copy.click;
      reset.textContent = copy.restart;

      target.addEventListener("click", (e) => {
        count += 1;
        scoreEl.textContent = count;
        target.textContent = count % 10 === 0 ? copy.bonus : copy.click;
        burst(e);
      });

      reset.addEventListener("click", () => {
        count = 0;
        scoreEl.textContent = count;
        target.textContent = copy.click;
      });

      function burst(event) {
        const stageBox = stage.getBoundingClientRect();
        const targetBox = target.getBoundingClientRect();
        const originX = event.clientX ? event.clientX - stageBox.left : targetBox.left + targetBox.width / 2 - stageBox.left;
        const originY = event.clientY ? event.clientY - stageBox.top  : targetBox.top  + targetBox.height / 2 - stageBox.top;
        const colors = ["#00f5e0","#ffb000","#ff334d","#8f5cff","#38e05f","#ffffff"];
        const shapes = ["square","triangle","star","diamond","circle"];
        for (let i = 0; i < 18; i++) {
          const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.45;
          const dist  = 54 + Math.random() * 92;
          const p = document.createElement("span");
          const shape = shapes[Math.floor(Math.random() * shapes.length)];
          p.className = `particle ${shape}`;
          p.textContent = shape === "star" ? "★" : shape === "diamond" ? "◆" : shape === "circle" ? "●" : "";
          p.style.left = `${originX}px`;
          p.style.top  = `${originY}px`;
          p.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
          p.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
          p.style.setProperty("--spin", `${Math.random() * 360 - 180}deg`);
          const color = colors[Math.floor(Math.random() * colors.length)];
          p.style.setProperty("--particle-color", color);
          p.style.setProperty("--particle-glow", color);
          p.style.setProperty("--particle-size", `${14 + Math.random() * 12}px`);
          stage.appendChild(p);
          p.addEventListener("animationend", () => p.remove(), { once: true });
        }
      }
    </script>
  </body>
</html>
