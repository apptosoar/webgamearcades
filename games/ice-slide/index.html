<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Slide — Webgame Arcades</title>
  <meta name="description" content="Slide on ice until you hit a wall. Navigate the penguin to the star across 15 icy puzzles. Free browser puzzle game." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://webgamearcades.com/games/ice-slide/" />
  <meta property="og:title" content="Ice Slide — Webgame Arcades" />
  <meta property="og:description" content="Slide on ice until you hit a wall. Navigate the penguin to the star across 15 icy puzzles." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://webgamearcades.com/games/ice-slide/" />
  <meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1237395397379866" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../action-style.css" />
  <style>
    .game { height: 100dvh; width: min(720px, 100%); grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
    canvas { grid-column: 1/-1; width: 100%; height: 100%; min-height: 0; border: 1px solid rgba(255,255,255,0.13); border-radius: 8px; background: #151820; touch-action: none; cursor: default; }
    .dpad { display: flex; gap: 6px; align-items: center; }
    .dpad button { width: 44px; height: 44px; font-size: 18px; padding: 0; border-radius: 10px; opacity: 0.7; }
    .dpad button:active { opacity: 1; transform: scale(0.92); }
  </style>
  <script src="/site-chrome.js"></script>
</head>
<body>
<main class="game">
  <div class="hud">
    <strong>Ice Slide</strong>
    <span>Level <b id="lvl">1</b>/15</span>
    <span>Moves <b id="moves">0</b></span>
  </div>
  <canvas id="c"></canvas>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button class="reset" id="reset" type="button">Restart</button>
    <a href="about.html" style="display:inline-flex;align-items:center;min-height:40px;padding:9px 13px;border:1px solid rgba(255,255,255,0.14);border-radius:8px;background:rgba(255,255,255,0.08);color:#b8bec9;text-decoration:none;font-size:inherit;">Info</a>
    <div class="dpad">
      <button id="bL">◀</button><button id="bU">▲</button><button id="bD">▼</button><button id="bR">▶</button>
    </div>
  </div>
</main>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const lvlEl   = document.getElementById("lvl");
const movesEl = document.getElementById("moves");

// 0=ice, 1=wall, 2=start, 3=goal
const LEVELS = [
  { grid: ["11111","10021","10001","10031","11111"], s:[1,1], g:[1,3] },
  { grid: ["111111","100001","100001","102001","100301","111111"], s:[3,1], g:[4,4] },
  { grid: ["1111111","1000001","1020001","1010001","1000301","1000001","1111111"], s:[2,1], g:[4,4] },
  { grid: ["11111111","10000001","10100001","10002001","10100001","10000031","10000001","11111111"], s:[3,2], g:[5,5] },
  { grid: ["111111111","100000001","101100001","100000201","100011001","100000001","100000031","100000001","111111111"], s:[3,2], g:[6,6] },
  { grid: ["1111111","1000201","1010001","1000001","1011001","1000301","1111111"], s:[1,3], g:[5,5] },
  { grid: ["11111111","10001001","12000001","10001001","10000001","10110001","10003001","11111111"], s:[2,1], g:[6,6] },
  { grid: ["111111111","100000001","102011001","100000001","100110001","100000001","100000031","100000001","111111111"], s:[2,1], g:[6,6] },
  { grid: ["1111111111","1000000001","1020110001","1000000001","1001100001","1000000001","1000110001","1000000031","1000000001","1111111111"], s:[2,1], g:[7,7] },
  { grid: ["111111111","102000001","100100001","100010001","100000001","110010001","100001001","100000031","111111111"], s:[1,1], g:[7,7] },
  { grid: ["11111111","12100001","10001001","10100001","10010001","10001001","10110031","11111111"], s:[1,1], g:[6,6] },
  { grid: ["111111111","100010001","100000001","120100001","100000001","100011001","100000031","100000001","111111111"], s:[3,1], g:[6,6] },
  { grid: ["1111111111","1020001001","1000100001","1010000001","1001000001","1000010001","1000100001","1010000031","1000000001","1111111111"], s:[1,1], g:[7,7] },
  { grid: ["111111111","100000001","100100001","120010001","100100001","100010001","101001001","100000031","111111111"], s:[3,1], g:[7,7] },
  { grid: ["1111111111","1000010001","1200001001","1000100001","1001000001","1000010001","1000101001","1010000031","1000000001","1111111111"], s:[2,1], g:[7,7] },
];

let W, H, CS, curLevel = 0, px, py, moves, animating = false, winFlash = 0;

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  W = canvas.width; H = canvas.height;
}
new ResizeObserver(() => { resize(); draw(); }).observe(canvas); resize();

function level() { return LEVELS[curLevel]; }
function grid() { return level().grid; }
function rows() { return grid().length; }
function cols() { return grid()[0].length; }
function cell(r, c) { return r >= 0 && r < rows() && c >= 0 && c < cols() ? +grid()[r][c] : 1; }

function loadLevel() {
  const lv = level();
  px = lv.s[0]; py = lv.s[1]; moves = 0;
  lvlEl.textContent = curLevel + 1; movesEl.textContent = 0;
}

function computeCS() { return Math.floor(Math.min(W / cols(), H / rows())); }

function draw() {
  ctx.clearRect(0, 0, W, H);
  CS = computeCS();
  const ox = (W - CS * cols()) / 2, oy = (H - CS * rows()) / 2;

  for (let r = 0; r < rows(); r++) {
    for (let c = 0; c < cols(); c++) {
      const v = cell(r, c);
      const x = ox + c * CS, y = oy + r * CS;
      if (v === 1) {
        ctx.fillStyle = "#2e3340";
        ctx.fillRect(x, y, CS, CS);
        ctx.fillStyle = "rgba(255,255,255,0.04)";
        ctx.fillRect(x + 2, y + 2, CS - 4, CS - 4);
      } else {
        ctx.fillStyle = v === 3 ? "rgba(43,209,196,0.1)" : "rgba(255,255,255,0.04)";
        ctx.fillRect(x, y, CS, CS);
        ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 1;
        ctx.strokeRect(x, y, CS, CS);
      }
    }
  }

  // goal star
  const lv = level();
  const gx = ox + lv.g[0] * CS + CS / 2, gy = oy + lv.g[1] * CS + CS / 2;
  ctx.save();
  ctx.shadowColor = "#f7b84b"; ctx.shadowBlur = 20 * devicePixelRatio;
  ctx.fillStyle = "#f7b84b"; ctx.font = `${CS * 0.7}px system-ui`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("⭐", gx, gy);
  ctx.restore();

  // player penguin
  const px2 = ox + px * CS + CS / 2, py2 = oy + py * CS + CS / 2;
  ctx.save();
  ctx.shadowColor = "#2bd1c4"; ctx.shadowBlur = 16 * devicePixelRatio;
  ctx.fillStyle = "#2bd1c4"; ctx.font = `${CS * 0.72}px system-ui`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("🐧", px2, py2);
  ctx.restore();
}

function slide(dr, dc) {
  if (animating) return;
  let r = py, c = px;
  while (true) {
    const nr = r + dr, nc = c + dc;
    if (cell(nr, nc) === 1) break;
    r = nr; c = nc;
    if (r === level().g[1] && c === level().g[0]) break;
  }
  if (r === py && c === px) return;
  py = r; px = c; moves++;
  movesEl.textContent = moves;
  draw();
  if (py === level().g[1] && px === level().g[0]) {
    setTimeout(() => {
      if (curLevel < LEVELS.length - 1) { curLevel++; loadLevel(); draw(); }
      else {
        ctx.fillStyle = "rgba(11,12,15,0.82)"; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#f7b84b"; ctx.textAlign = "center";
        ctx.font = `bold ${W * 0.07}px system-ui`; ctx.fillText("You Win! 🎉", W / 2, H * 0.45);
        ctx.font = `${W * 0.04}px system-ui`; ctx.fillStyle = "#b8bec9";
        ctx.fillText("All 15 levels complete!", W / 2, H * 0.57);
      }
    }, 200);
  }
}

document.addEventListener("keydown", e => {
  const map = { ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1] };
  if (map[e.key]) { e.preventDefault(); slide(...map[e.key]); }
});
["bU","bD","bL","bR"].forEach((id, i) => {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  document.getElementById(id).addEventListener("pointerdown", e => { e.preventDefault(); slide(...dirs[i]); });
});

let tx0, ty0;
canvas.addEventListener("pointerdown", e => { tx0 = e.clientX; ty0 = e.clientY; });
canvas.addEventListener("pointerup", e => {
  const dx = e.clientX - tx0, dy = e.clientY - ty0;
  if (Math.hypot(dx, dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) slide(0, dx > 0 ? 1 : -1);
  else slide(dy > 0 ? 1 : -1, 0);
});

document.getElementById("reset").addEventListener("click", () => { loadLevel(); draw(); });
loadLevel(); draw();
</script>
</body>
</html>
