<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="description" content="Watch the tile sequence light up, then repeat it back. A classic memory challenge that adds one more step every round. Play free instantly in your browser.">

<link rel="canonical" href="https://webgamearcades.com/games/memory-grid/">
<meta property="og:title" content="Memory Grid — Webgame Arcades">
<meta property="og:description" content="Watch the tile sequence light up, then repeat it back. A classic memory challenge that adds one more step every round.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://webgamearcades.com/games/memory-grid/">
<meta property="og:image" content="https://webgamearcades.com/assets/hero-game-portal.png">
<link rel="stylesheet" href="../game-shell.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1237395397379866" crossorigin="anonymous"></script>
<script src="../game-shell.js"></script>

<style>
.site-topbar{width:100%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;min-height:52px;padding:0 clamp(12px,3vw,32px);border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(14,15,18,0.97);box-sizing:border-box;flex-shrink:0;position:sticky;top:0;z-index:10}
.site-brand{display:flex;align-items:center;gap:8px;color:#f4f2ea;text-decoration:none;font-weight:800;font-size:.9rem;min-width:0}
.site-brand-mark{display:grid;width:28px;height:28px;flex-shrink:0;place-items:center;border-radius:6px;background:linear-gradient(135deg,#f7b84b,#f05d5e);color:#15110a;font-weight:900;font-size:.78rem}
.site-brand-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:380px){.site-brand-name{display:none}}
.game-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
.game-actions a{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:7px;border:1px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.06);color:#b8bec9;text-decoration:none;font-size:.8rem;font-weight:600;transition:background .15s,color .15s;white-space:nowrap}
.game-actions a:hover{background:rgba(255,255,255,0.12);color:#f4f2ea}
.wrap{height:min(calc(100svh - 52px),720px)!important;flex-shrink:0}
@media(max-width:520px){.game-actions .about-label{display:none}}
</style>
</head>
<body class="game-memory-grid">
<header class="site-topbar">
  <a class="site-brand" href="/"><span class="site-brand-mark">G</span><span class="site-brand-name">Webgame Arcades</span></a>
  <div class="game-actions">
    <a href="./about.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span class="about-label">About</span>
    </a>
    <a href="/">← Games</a>
  </div>
</header>
<div class="wrap">
  <div class="hud">
    <span class="pill">Memory Grid</span>
    <span>Round <b id="round">1</b></span>
  </div>
  <div class="stage center">
    <div id="grid" style="display:grid;grid-template-columns:repeat(3,90px);gap:10px"></div>
  </div>
  <button id="start">Start</button>
</div>
<script>
  const grid = document.querySelector("#grid");
  const roundEl = document.querySelector("#round");
  const startBtn = document.querySelector("#start");
  const failText = "Failed! Starting again from round 1.";
  let round = 1, seq = [], input = [];
  for (let i = 0; i < 9; i++) {
    const b = document.createElement("button");
    b.textContent = i + 1;
    b.style.width = "90px";
    b.style.height = "90px";
    b.onclick = () => pick(i, b);
    grid.appendChild(b);
  }
  startBtn.onclick = next;
  function flash(i) {
    const b = grid.children[i];
    b.style.background = "#2bd1c4";
    setTimeout(() => b.style.background = "#f7b84b", 360);
  }
  function next() {
    input = [];
    seq.push(Math.floor(Math.random() * 9));
    roundEl.textContent = round;
    seq.forEach((n, i) => setTimeout(() => flash(n), i * 520));
  }
  function pick(i, b) {
    input.push(i);
    flash(i);
    const at = input.length - 1;
    if (seq[at] !== i) {
      alert(failText);
      round = 1;
      seq = [];
      roundEl.textContent = round;
      return;
    }
    if (input.length === seq.length) {
      round++;
      setTimeout(next, 600);
    }
  }
</script>


</body>
</html>
