    <script>
      (() => {
        const params = new URLSearchParams(location.search);
        const lang = params.get("lang") || params.get("locale") || localStorage.getItem("locale") || "";

        if (lang) target.searchParams.set("lang", lang);
        target.hash = "privacy";
